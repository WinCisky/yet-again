<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yet Again — Event Times</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <meta name="theme-color" content="#1a1a2e" />
</head>

<body class="flex flex-col items-center">
    <a id="backLink" href="index.html">← Back</a>
    <h1>Event Times</h1>
    <div id="status"></div>
    <div id="content" class="flex flex-col items-center"></div>

    <script type="module">
        import { SERVER_URL } from "./js/global.js";

        const statusEl = document.getElementById("status");
        const contentEl = document.getElementById("content");

        function setStatus(msg) { statusEl.textContent = msg; }

        const params = new URLSearchParams(window.location.search);
        const eventTypeId = params.get("eventTypeId");
        if (eventTypeId) {
            document.getElementById("backLink").href = `event-type-form.html?id=${encodeURIComponent(eventTypeId)}`;
        }

        async function getEndpoint() {
            if (!("serviceWorker" in navigator) || !("PushManager" in window)) return null;
            const reg = await navigator.serviceWorker.getRegistration("sw.js");
            if (!reg) return null;
            const sub = await reg.pushManager.getSubscription();
            return sub ? sub.endpoint : null;
        }

        async function load() {
            const endpoint = await getEndpoint();
            if (!endpoint) {
                setStatus("No subscription found.");
                return;
            }
            setStatus("Loading event types…");
            try {
                // First load event types so the user can pick one
                const typesRes = await fetch(`${SERVER_URL}/event-types?endpoint=${encodeURIComponent(endpoint)}`);
                if (!typesRes.ok) throw new Error(`Server error: ${typesRes.status}`);
                const types = await typesRes.json();
                if (types.length === 0) {
                    setStatus("No event types configured. Create an event type first.");
                    return;
                }
                // For each type, load its times
                setStatus("Loading times…");
                for (const t of types) {
                    const timesRes = await fetch(`${SERVER_URL}/event-times?endpoint=${encodeURIComponent(endpoint)}&eventTypeId=${encodeURIComponent(t.id)}`);
                    if (!timesRes.ok) continue;
                    t.times = await timesRes.json();
                }
                setStatus("");
                // TODO: render types with their times
            } catch (err) {
                setStatus(`❌ Error: ${err.message}`);
            }
        }

        load();
    </script>
</body>

</html>
