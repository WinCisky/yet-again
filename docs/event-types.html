<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yet Again — Event Types</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;">
  <a href="index.html" style="margin:1rem 0 0 0;padding:0.25rem 0.5rem;">← Back</a>
  <h1 style="margin:1rem 0 0.25rem 0;">Event Types</h1>
  <a href="event-type-form.html" style="margin:1rem 0 0 0;padding:0.25rem 0.5rem;">+ New Type</a>
  <div id="status" style="margin:1rem 0;"></div>
  <div id="content" style="display:flex;flex-direction:column;align-items:stretch;"></div>

  <script>
    const SERVER_URL = "https://yet-again.simo.deno.net";
    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");

    function setStatus(msg) { statusEl.textContent = msg; }

    async function getEndpoint() {
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) return null;
      const reg = await navigator.serviceWorker.getRegistration("sw.js");
      if (!reg) return null;
      const sub = await reg.pushManager.getSubscription();
      return sub ? sub.endpoint : null;
    }

    async function deleteType(endpoint, id) {
      if (!confirm("Delete this event type?")) return;
      try {
        const res = await fetch(`${SERVER_URL}/event-types`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint, id }),
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        load();
      } catch (err) {
        setStatus(`❌ Error: ${err.message}`);
      }
    }

    function renderTypes(types, endpoint) {
      contentEl.innerHTML = "";
      for (const t of types) {
        const row = document.createElement("div");
        row.style.cssText = "display:flex;align-items:center;margin:0.5rem 0;padding:0.25rem 0;";

        const color = document.createElement("span");
        color.style.cssText = `display:inline-block;width:1rem;height:1rem;margin:0 0.5rem 0 0;background:${t.color};`;
        row.appendChild(color);

        const name = document.createElement("span");
        name.textContent = t.name;
        name.style.cssText = "flex:1;margin:0 0.5rem 0 0;";
        row.appendChild(name);

        const editBtn = document.createElement("a");
        editBtn.href = `event-type-form.html?id=${encodeURIComponent(t.id)}`;
        editBtn.textContent = "Edit";
        editBtn.style.cssText = "margin:0 0.5rem 0 0;padding:0.25rem 0.5rem;";
        row.appendChild(editBtn);

        const delBtn = document.createElement("button");
        delBtn.textContent = "Delete";
        delBtn.style.cssText = "padding:0.25rem 0.5rem;";
        delBtn.addEventListener("click", () => deleteType(endpoint, t.id));
        row.appendChild(delBtn);

        contentEl.appendChild(row);
      }
    }

    async function load() {
      const endpoint = await getEndpoint();
      if (!endpoint) {
        setStatus("No subscription found.");
        return;
      }
      setStatus("Loading…");
      try {
        const res = await fetch(`${SERVER_URL}/event-types?endpoint=${encodeURIComponent(endpoint)}`);
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const types = await res.json();
        setStatus("");
        if (types.length === 0) {
          setStatus("No event types configured.");
          contentEl.innerHTML = "";
          return;
        }
        renderTypes(types, endpoint);
      } catch (err) {
        setStatus(`❌ Error: ${err.message}`);
      }
    }

    load();
  </script>
</body>
</html>
