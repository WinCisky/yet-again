<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yet Again — Push Notifications</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />

<body class="flex flex-col items-center">
    <h1>Yet Again</h1>

    <div id="notSubscribed" class="flex flex-col items-center hidden">

    <div id="subscribed" class="flex flex-col items-center hidden gap-4">
        <div class="flex gap-4 items-center">
            <button id="unsubscribeBtn">Unsubscribe</button>
            <a href="event-type-form.html">Add Type</a>
        </div>
        <div id="content" class="flex flex-col items-stretch border p-2 gap-2"></div>
    </div>

    <div id="status"></div>

    <p><a href="privacy.html">Privacy Policy</a></p>

    <script src="js/app.js" type="module"></script>
