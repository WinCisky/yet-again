<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yet Again — Push Notifications</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { margin-bottom: 0.25rem; }
    p  { margin: 0.5rem 0; color: #aaa; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
    }
    button:disabled { background: #555; cursor: not-allowed; }
    #status { margin-top: 1rem; font-size: 0.9rem; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>Yet Again</h1>
  <p>Scheduled push notification demo</p>

  <button id="enableBtn">Enable Notifications</button>
  <div id="status"></div>

  <!-- app.js handles all subscription logic -->
  <script src="app.js"></script>
</body>
</html>
